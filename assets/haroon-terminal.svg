<svg width="760" height="430" viewBox="0 0 760 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
    .label { fill: #8b949e; font-size: 15px; }
    .value { fill: #e6edf3; font-size: 15px; }
    .accent { fill: #d97757; }
    .purple { fill: #a78bfa; }
    .line { opacity: 0; animation: reveal .45s ease forwards; }
    .l1 { animation-delay: .35s; }
    .l2 { animation-delay: .75s; }
    .l3 { animation-delay: 1.15s; }
    .l4 { animation-delay: 1.55s; }
    .l5 { animation-delay: 1.95s; }
    .l6 { animation-delay: 2.35s; }
    .l7 { animation-delay: 2.75s; }
    .cursor { animation: blink 1s steps(2, jump-none) infinite; }
    .pulse { transform-origin: center; animation: pulse 2.4s ease-in-out infinite; }
    @keyframes reveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse {
      0%, 100% { opacity: .55; }
      50% { opacity: 1; }
    }
  </style>

  <rect x="1" y="1" width="758" height="428" rx="18" fill="#0D1117" stroke="#30363D" stroke-width="2"/>
  <rect x="1" y="1" width="758" height="52" rx="18" fill="#161B22"/>
  <path d="M1 35H759V53H1V35Z" fill="#161B22"/>
  <circle cx="27" cy="27" r="7" fill="#FF5F56"/>
  <circle cx="51" cy="27" r="7" fill="#FFBD2E"/>
  <circle cx="75" cy="27" r="7" fill="#27C93F"/>
  <text x="380" y="32" text-anchor="middle" class="mono" fill="#8B949E" font-size="13">haroon@github — profile</text>

  <g class="line l1">
    <text x="34" y="88" class="mono accent" font-size="15">haroon@github</text>
    <text x="160" y="88" class="mono purple" font-size="15">~</text>
    <text x="176" y="88" class="mono value">$ profile --inspect</text>
  </g>

  <g class="line l2">
    <text x="34" y="130" class="mono label">name</text>
    <text x="174" y="130" class="mono value">Haroon K.M.</text>
  </g>
  <g class="line l3">
    <text x="34" y="165" class="mono label">role</text>
    <text x="174" y="165" class="mono value">AI / ML Engineer</text>
  </g>
  <g class="line l4">
    <text x="34" y="200" class="mono label">education</text>
    <text x="174" y="200" class="mono value">B.Tech · AI &amp; Data Science</text>
  </g>
  <g class="line l5">
    <text x="34" y="235" class="mono label">building</text>
    <text x="174" y="235" class="mono value">Agents · RAG · ML systems</text>
  </g>
  <g class="line l6">
    <text x="34" y="270" class="mono label">principle</text>
    <text x="174" y="270" class="mono value">Research deeply. Ship clearly.</text>
  </g>
  <g class="line l7">
    <text x="34" y="305" class="mono label">status</text>
    <circle cx="181" cy="300" r="6" fill="#3FB950" class="pulse"/>
    <text x="198" y="305" class="mono" fill="#3FB950" font-size="15">open to meaningful work</text>
  </g>

  <line x1="34" y1="333" x2="726" y2="333" stroke="#21262D"/>

  <g class="line l7">
    <text x="34" y="371" class="mono accent" font-size="15">haroon@github</text>
    <text x="160" y="371" class="mono purple" font-size="15">~</text>
    <text x="176" y="371" class="mono value">$</text>
    <rect x="194" y="356" width="9" height="19" rx="1" fill="#D97757" class="cursor"/>
    <text x="34" y="405" class="mono" fill="#6E7681" font-size="12">exit code 0 · ideas are compiling</text>
  </g>
</svg>
